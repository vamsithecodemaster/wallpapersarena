<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sun-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF007F"/>
      <stop offset="100%" stop-color="#8A2BE2"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B071A"/>
      <stop offset="100%" stop-color="#150F2A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- Outer glowing ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#00F0FF" stroke-width="3" opacity="0.4"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#00F0FF" stroke-width="1.5"/>
  
  <!-- Synthwave Sun -->
  <circle cx="50" cy="50" r="30" fill="url(#sun-grad)"/>
  
  <!-- Sun grid cuts, getting thicker at the bottom -->
  <rect x="15" y="55" width="70" height="3" fill="#150F2A"/>
  <rect x="15" y="62" width="70" height="4" fill="#150F2A"/>
  <rect x="15" y="71" width="70" height="6" fill="#150F2A"/>
  
  <text x="50" y="47" font-family="sans-serif" font-weight="900" font-size="28" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2" style="text-shadow: 2px 2px 0px #00F0FF;">W</text>
  <text x="50" y="70" font-family="sans-serif" font-weight="900" font-size="28" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2" style="text-shadow: 2px 2px 0px #00F0FF;">A</text>
</svg>
